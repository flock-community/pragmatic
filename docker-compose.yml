services:
  postgres:
    image: postgres:18-alpine # Also update app/src/test/kotlin/community/flock/pragmatic/app/environment/WithPostgresContainer.kt
    hostname: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    volumes:
      - "./app/src/test/resources/postgres:/docker-entrypoint-initdb.d"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
